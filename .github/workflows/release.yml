name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — Apple Silicon
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          # macOS — Intel
          - os: macos-latest
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          # Windows — x64 (.msi + .exe NSIS)
          - os: windows-latest
            rust-target: ''
            args: ''

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm ci

      # whisper.cpp's GGML_NATIVE auto-detection mixes `-mcpu=native` (which
      # defines __ARM_FEATURE_MATMUL_INT8) with a `+noi8mm` codegen flag on the
      # hosted Apple-Silicon runner, so ggml-cpu-quants.c calls the i8mm intrinsic
      # `vmmlaq_s32` from a TU compiled without i8mm → build fails. Forcing
      # GGML_NATIVE=OFF skips the probe and builds a clean ARM baseline.
      # (whisper-rs-sys ≥0.15 forwards GGML_* env vars to CMake.)
      - name: Force GGML baseline on Apple Silicon
        if: matrix.rust-target == 'aarch64-apple-darwin'
        run: echo "GGML_NATIVE=OFF" >> "$GITHUB_ENV"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Claude X ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required so the updater artifacts (.sig) are signed with the key
          # matching `pubkey` in tauri.conf.json — without these, auto-update fails.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
